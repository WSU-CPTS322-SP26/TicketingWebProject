# App name (used in logs/monitoring)
spring.application.name=backend

# Supabase/Postgres JDBC URL (example: jdbc:postgresql://host:6543/postgres?sslmode=require)
spring.datasource.url=${SUPABASE_DB_URL}

# Supabase DB credentials (set via environment variables / GitHub Secrets)
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Dev-only: auto-update schema (use migrations later)
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.jpa.hibernate.ddl-auto=update

# Log SQL queries (enable only for debugging)
spring.jpa.show-sql=false

# Hibernate dialect for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Recommended for APIs (avoid lazy-loading in controllers)
spring.jpa.open-in-view=false

# JWT ? secret must be >= 64 characters for HS512 (set via environment variable / GitHub Secret)
app.jwt.secret=${JWT_SECRET}

# Token expiry in milliseconds (86400000 = 24 hours)
app.jwt.expiration=86400000