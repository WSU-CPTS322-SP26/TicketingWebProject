name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:

  # This job scans the codebase for flagged comments like TODO, FIXME, BUG, etc.
  # If any are found, the pipeline fails to prevent unfinished or risky code from merging.
  comment-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for flagged comments
        run: |
          FOUND=$(grep -rIn --exclude-dir={node_modules,target,build,dist,.git} \
            -e 'TODO' -e 'FIXME' -e 'BUG' -e 'HACK' backend/ frontend/ || true)
          [ -z "$FOUND" ] || (echo "$FOUND" && exit 1)

  # This job builds and tests the Spring Boot backend.
  # It injects Supabase DB credentials from GitHub Secrets and runs Maven tests.
  backend-ci:
    runs-on: ubuntu-latest
    needs: comment-check
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_DB_USERNAME: ${{ secrets.SUPABASE_DB_USERNAME }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Verify secrets
        run: |
          echo "SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}"
          echo "SUPABASE_DB_USERNAME: ${{ secrets.SUPABASE_DB_USERNAME }}"
          echo "SUPABASE_DB_PASSWORD: [MASKED]"
      - name: Build and test (Maven)
        run: cd backend && ./mvnw -B clean test

  # This job installs dependencies and builds the frontend app.
  # It ensures the React/Vite project compiles successfully before merging.
  frontend-ci:
    runs-on: ubuntu-latest
    needs: comment-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: cd frontend && npm ci && npm run build